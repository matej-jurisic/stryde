services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Data Source=/data/stryde.db"
      Database__MigrateOnStartup: "true"
    volumes:
      - stryde_data:/data
    restart: unless-stopped

volumes:
  stryde_data:
